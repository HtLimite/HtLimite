name: Generate Contribution Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate contribution snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: HtLimite
          outputs: |
            assets/github-contribution-grid-snake.svg
            assets/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Commit generated snake SVG
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(profile): update contribution snake"
          file_pattern: assets/github-contribution-grid-snake.svg assets/github-contribution-grid-snake-dark.svg
