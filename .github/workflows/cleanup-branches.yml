name: Cleanup Remote Branches

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/cleanup-branches.yml"

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Delete temporary remote branches
        shell: bash
        run: |
          set -euo pipefail

          branches=(
            "output"
            "profile-output"
            "output-temp"
            "output-fix"
            "snake-output-backup"
            "stop-output-test"
            "zzz"
            "this-is-wrong"
            "cleanup-profile-branches"
            "cleanup-profile"
            "cleanup-profile-a"
            "cleanup-profile-b"
            "cleanup-branches-runner"
            "cleanup-branches-runner-2"
          )

          git fetch origin --prune

          for branch in "${branches[@]}"; do
            if git ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1; then
              echo "Deleting remote branch: $branch"
              git push origin --delete "$branch"
            else
              echo "Skip missing branch: $branch"
            fi
          done
