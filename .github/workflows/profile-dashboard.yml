name: Generate Profile Dashboard

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/profile-dashboard.yml"
      - "README.md"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate profile dashboard SVG
        env:
          DASHBOARD_USER: HtLimite
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 <<'PY'
          import os
          import html
          import json
          import urllib.request
          from collections import Counter
          from datetime import datetime, timezone, date, timedelta

          user = os.environ.get('DASHBOARD_USER', 'HtLimite')
          token = os.environ.get('GH_TOKEN', '')
          headers = {
              'Accept': 'application/vnd.github+json',
              'User-Agent': 'profile-dashboard-generator'
          }
          if token:
              headers['Authorization'] = 'Bearer ' + token

          def request_json(url):
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=30) as res:
                  return json.loads(res.read().decode('utf-8'))

          def graphql(query, variables=None):
              payload = json.dumps({'query': query, 'variables': variables or {}}).encode('utf-8')
              req_headers = dict(headers)
              req_headers['Content-Type'] = 'application/json'
              req = urllib.request.Request('https://api.github.com/graphql', data=payload, headers=req_headers, method='POST')
              with urllib.request.urlopen(req, timeout=30) as res:
                  return json.loads(res.read().decode('utf-8'))

          def safe(value):
              return html.escape(str(value), quote=True)

          repos = []
          page = 1
          while page <= 10:
              data = request_json(f'https://api.github.com/users/{user}/repos?per_page=100&page={page}&sort=updated&type=owner')
              if not data:
                  break
              repos.extend(data)
              if len(data) < 100:
                  break
              page += 1

          total_repos = len(repos)
          total_stars = sum(repo.get('stargazers_count', 0) for repo in repos)
          total_forks = sum(repo.get('forks_count', 0) for repo in repos)
          total_watchers = sum(repo.get('watchers_count', 0) for repo in repos)
          language_counter = Counter(repo.get('language') or 'Other' for repo in repos)
          top_languages = language_counter.most_common(6)
          updated = datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M UTC')
          os.makedirs('assets', exist_ok=True)

          stats_svg = f'''<svg xmlns="http://www.w3.org/2000/svg" width="520" height="220" viewBox="0 0 520 220">
            <rect x="1" y="1" width="518" height="218" rx="16" fill="#141321" stroke="#30363d"/>
            <text x="28" y="42" fill="#f8fafc" font-family="Arial" font-size="22" font-weight="700">GitHub Stats</text>
            <text x="28" y="66" fill="#8b949e" font-family="Arial" font-size="13">Auto generated for {safe(user)} · {safe(updated)}</text>
            <rect x="28" y="92" width="104" height="56" rx="12" fill="#1f2937" stroke="#374151"/>
            <text x="44" y="115" fill="#c9d1d9" font-family="Arial" font-size="13">Repos</text>
            <text x="44" y="140" fill="#ffffff" font-family="Arial" font-size="24" font-weight="700">{total_repos}</text>
            <rect x="148" y="92" width="104" height="56" rx="12" fill="#1f2937" stroke="#374151"/>
            <text x="164" y="115" fill="#c9d1d9" font-family="Arial" font-size="13">Stars</text>
            <text x="164" y="140" fill="#ff6ec7" font-family="Arial" font-size="24" font-weight="700">{total_stars}</text>
            <rect x="268" y="92" width="104" height="56" rx="12" fill="#1f2937" stroke="#374151"/>
            <text x="284" y="115" fill="#c9d1d9" font-family="Arial" font-size="13">Forks</text>
            <text x="284" y="140" fill="#7c3aed" font-family="Arial" font-size="24" font-weight="700">{total_forks}</text>
            <rect x="388" y="92" width="104" height="56" rx="12" fill="#1f2937" stroke="#374151"/>
            <text x="404" y="115" fill="#c9d1d9" font-family="Arial" font-size="13">Watchers</text>
            <text x="404" y="140" fill="#22c55e" font-family="Arial" font-size="24" font-weight="700">{total_watchers}</text>
            <text x="28" y="178" fill="#c9d1d9" font-family="Arial" font-size="13">Profile focus</text>
            <rect x="28" y="190" width="464" height="12" rx="6" fill="#30363d"/>
            <rect x="28" y="190" width="400" height="12" rx="6" fill="#ff6ec7"/>
          </svg>'''

          colors = ['#3178c6', '#f7df1e', '#4fc08d', '#61dafb', '#ff6ec7', '#7c3aed']
          total_lang = sum(count for _, count in top_languages) or 1
          y = 92
          rows = []
          bars = []
          for idx, (lang, count) in enumerate(top_languages):
              width = int(250 * count / total_lang)
              color = colors[idx % len(colors)]
              rows.append(f'<rect x="48" y="{y}" width="14" height="14" rx="4" fill="{color}"/><text x="72" y="{y+12}" fill="#c9d1d9" font-family="Arial" font-size="14">{safe(lang)}</text><text x="428" y="{y+12}" fill="#8b949e" font-family="Arial" font-size="13">{count}</text>')
              bars.append(f'<rect x="170" y="{y+2}" width="250" height="10" rx="5" fill="#30363d"/><rect x="170" y="{y+2}" width="{width}" height="10" rx="5" fill="{color}"/>')
              y += 22

          langs_svg = f'''<svg xmlns="http://www.w3.org/2000/svg" width="520" height="220" viewBox="0 0 520 220">
            <rect x="1" y="1" width="518" height="218" rx="16" fill="#141321" stroke="#30363d"/>
            <text x="28" y="42" fill="#f8fafc" font-family="Arial" font-size="22" font-weight="700">Top Languages</text>
            <text x="28" y="66" fill="#8b949e" font-family="Arial" font-size="13">Based on public repositories · {safe(updated)}</text>
            {''.join(bars)}
            {''.join(rows)}
          </svg>'''

          total_contributions = 0
          current_streak = 0
          longest_streak = 0
          active_days = 0
          try:
              q = '''query($login: String!) {
                user(login: $login) {
                  contributionsCollection {
                    contributionCalendar {
                      totalContributions
                      weeks { contributionDays { date contributionCount } }
                    }
                  }
                }
              }'''
              result = graphql(q, {'login': user})
              days = []
              calendar = result['data']['user']['contributionsCollection']['contributionCalendar']
              total_contributions = calendar.get('totalContributions', 0)
              for week in calendar.get('weeks', []):
                  for d in week.get('contributionDays', []):
                      days.append((d['date'], int(d['contributionCount'])))
              days.sort()
              streak = 0
              for _, count in days:
                  if count > 0:
                      active_days += 1
                      streak += 1
                      longest_streak = max(longest_streak, streak)
                  else:
                      streak = 0
              day_map = dict(days)
              today = date.today()
              cursor = today
              while True:
                  count = day_map.get(cursor.isoformat(), 0)
                  if count > 0:
                      current_streak += 1
                      cursor -= timedelta(days=1)
                  else:
                      if cursor == today:
                          cursor -= timedelta(days=1)
                          continue
                      break
          except Exception as exc:
              total_contributions = total_repos + total_stars + total_forks
              active_days = total_repos
              current_streak = 0
              longest_streak = 0

          streak_svg = f'''<svg xmlns="http://www.w3.org/2000/svg" width="760" height="180" viewBox="0 0 760 180">
            <rect x="1" y="1" width="758" height="178" rx="16" fill="#141321" stroke="#30363d"/>
            <text x="30" y="42" fill="#f8fafc" font-family="Arial" font-size="22" font-weight="700">GitHub Streak</text>
            <text x="30" y="66" fill="#8b949e" font-family="Arial" font-size="13">Generated from GitHub contribution calendar · {safe(updated)}</text>
            <rect x="34" y="94" width="150" height="58" rx="12" fill="#1f2937" stroke="#374151"/>
            <text x="52" y="118" fill="#c9d1d9" font-family="Arial" font-size="13">Current Streak</text>
            <text x="52" y="144" fill="#ff6ec7" font-family="Arial" font-size="24" font-weight="700">{current_streak} days</text>
            <rect x="206" y="94" width="150" height="58" rx="12" fill="#1f2937" stroke="#374151"/>
            <text x="224" y="118" fill="#c9d1d9" font-family="Arial" font-size="13">Longest Streak</text>
            <text x="224" y="144" fill="#7c3aed" font-family="Arial" font-size="24" font-weight="700">{longest_streak} days</text>
            <rect x="378" y="94" width="150" height="58" rx="12" fill="#1f2937" stroke="#374151"/>
            <text x="396" y="118" fill="#c9d1d9" font-family="Arial" font-size="13">Active Days</text>
            <text x="396" y="144" fill="#22c55e" font-family="Arial" font-size="24" font-weight="700">{active_days}</text>
            <rect x="550" y="94" width="150" height="58" rx="12" fill="#1f2937" stroke="#374151"/>
            <text x="568" y="118" fill="#c9d1d9" font-family="Arial" font-size="13">Contributions</text>
            <text x="568" y="144" fill="#06b6d4" font-family="Arial" font-size="24" font-weight="700">{total_contributions}</text>
          </svg>'''

          trophy_items = [
              ('Repos', total_repos, '#7c3aed'),
              ('Stars', total_stars, '#ff6ec7'),
              ('Forks', total_forks, '#06b6d4'),
              ('Languages', len(language_counter), '#22c55e'),
              ('Active Days', active_days, '#f59e0b'),
              ('Contribs', total_contributions, '#ef4444'),
          ]
          trophies = []
          x = 30
          for name, value, color in trophy_items:
              trophies.append(f'<rect x="{x}" y="88" width="130" height="46" rx="13" fill="#1f2937" stroke="{color}"/><text x="{x+16}" y="116" fill="{color}" font-family="Arial" font-size="15" font-weight="700">{safe(name)}: {value}</text>')
              x += 144
          trophy_svg = f'''<svg xmlns="http://www.w3.org/2000/svg" width="900" height="150" viewBox="0 0 900 150">
            <rect x="1" y="1" width="898" height="148" rx="16" fill="#141321" stroke="#30363d"/>
            <text x="30" y="42" fill="#f8fafc" font-family="Arial" font-size="22" font-weight="700">GitHub Trophy</text>
            <text x="30" y="66" fill="#8b949e" font-family="Arial" font-size="13">Repository achievements · {safe(updated)}</text>
            {''.join(trophies)}
          </svg>'''

          files = {
              'assets/github-profile-stats.svg': stats_svg,
              'assets/top-languages.svg': langs_svg,
              'assets/github-streak.svg': streak_svg,
              'assets/github-trophy.svg': trophy_svg,
          }
          for path, content in files.items():
              with open(path, 'w', encoding='utf-8') as f:
                  f.write(content)
          PY

      - name: Commit generated dashboard
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(profile): update github dashboard"
          file_pattern: assets/github-profile-stats.svg assets/top-languages.svg assets/github-streak.svg assets/github-trophy.svg
